<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Date Anfrage 🙊</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 900px;
      min-height: 100vh;
      padding: 30px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screen {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 2.2rem;
      line-height: 1.3;
      margin-bottom: 120px;
      max-width: 700px;
    }

    .btn {
      padding: 15px 32px;
      font-size: 1.1rem;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    .yesBtn {
      background: #4CAF50;
      color: white;
      position: absolute;
      left: 28%;
      top: 65%;
    }

    .noBtn {
      background: #ff4d4d;
      color: white;
      position: absolute;
      left: 58%;
      top: 65%;
    }

    .bigText {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .subText {
      font-size: 1.25rem;
      line-height: 1.5;
      max-width: 550px;
      margin-bottom: 35px;
    }

    .actionBtn {
      padding: 16px 34px;
      border: none;
      border-radius: 16px;
      background: white;
      color: #ff5e8a;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    }

    .glassCard {
      width: 100%;
      max-width: 800px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .activityGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      margin-top: 30px;
      margin-bottom: 35px;
    }

    .activityCard {
      background: rgba(255,255,255,0.18);
      border: 2px solid transparent;
      border-radius: 22px;
      padding: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .activityCard:hover {
      transform: scale(1.03);
    }

    .activityCard.selected {
      border-color: white;
      background: rgba(255,255,255,0.28);
    }

    .activityCard img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 12px;
    }

    .activityTitle {
      font-size: 1rem;
      font-weight: bold;
    }

    input[type="datetime-local"] {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      margin-top: 20px;
      margin-bottom: 25px;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 1.8rem;
        margin-bottom: 160px;
      }

      .yesBtn {
        left: 18%;
        top: 68%;
      }

      .noBtn {
        left: 58%;
        top: 68%;
      }

      .bigText {
        font-size: 2.3rem;
      }

      .subText {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>

<div class="container" id="app">

  <div class="screen">

    <h1>
      Liebe Daniela, willst du mit mir auf ein Date gehen? 😊
    </h1>

    <button class="btn yesBtn" id="yesBtn">
      Ja ❤️
    </button>

    <button class="btn noBtn" id="noBtn">
      Nein 💔
    </button>

  </div>

</div>

<script>
const app = document.getElementById("app");

const activities = [
  {
    title: "Cocktails trinken 🍸",
    image: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=1200&auto=format&fit=crop"
  },
  {
    title: "Pizza Date 🍕",
    image: "https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1200&auto=format&fit=crop"
  },
  {
    title: "Spaziergang 🌅",
    image: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop"
  },
  {
    title: "Kinoabend 🎬",
    image: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1200&auto=format&fit=crop"
  }
];

let selectedActivity = "";

/* ❌ Nein Button bleibt IMMER sichtbar */
function setupNoButton() {
  const noBtn = document.getElementById("noBtn");

  noBtn.addEventListener("mouseover", () => {

    const padding = 20;

    const maxX =
      window.innerWidth - noBtn.offsetWidth - padding;

    const maxY =
      window.innerHeight - noBtn.offsetHeight - padding;

    const randomX =
      Math.random() * (maxX - padding) + padding;

    const randomY =
      Math.random() * (maxY - padding) + padding;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
  });
}

setupNoButton();

/* ❤️ Ja */
document.getElementById("yesBtn")
.addEventListener("click", () => {

  app.innerHTML = `
    <div class="screen">

      <div class="bigText">
        Juhuu 😍
      </div>

      <div class="subText">
        Das wird bestimmt ein wunderschönes Date 💖
      </div>

      <button class="actionBtn" onclick="showActivities()">
        Fast geschafft ✨
      </button>

    </div>
  `;
});

/* 🎯 Aktivitäten */
function showActivities() {

  let cards = "";

  activities.forEach((activity, index) => {

    cards += `
      <div class="activityCard"
           onclick="selectActivity(${index}, this)">

        <img src="${activity.image}" alt="activity">

        <div class="activityTitle">
          ${activity.title}
        </div>

      </div>
    `;
  });

  app.innerHTML = `
    <div class="screen">

      <div class="glassCard">

        <h2 style="margin-top:0;">
          Was wollen wir machen? 😊
        </h2>

        <p>
          Such dir einfach eine Aktivität aus 💖
        </p>

        <div class="activityGrid">
          ${cards}
        </div>

        <button
          class="actionBtn"
          onclick="showCalendar()"
          id="continueBtn"
          style="opacity:0.5; pointer-events:none;"
        >
          ...der finale Schritt ✨
        </button>

      </div>

    </div>
  `;
}

/* ✅ Aktivität auswählen */
function selectActivity(index, element) {

  selectedActivity = activities[index].title;

  document.querySelectorAll(".activityCard")
    .forEach(card => {
      card.classList.remove("selected");
    });

  element.classList.add("selected");

  const continueBtn =
    document.getElementById("continueBtn");

  continueBtn.style.opacity = "1";
  continueBtn.style.pointerEvents = "all";
}

/* 📅 Datumsauswahl */
function showCalendar() {

  app.innerHTML = `
    <div class="screen">

      <div class="glassCard">

        <h2 style="margin-top:0;">
          Wann passt es dir? 😊
        </h2>

        <p>
          Wähle jetzt noch Datum und Uhrzeit 💕
        </p>

        <input
          type="datetime-local"
          id="dateInput"
        >

        <button
          class="actionBtn"
          onclick="confirmDate()"
          style="width:100%;"
        >
          Termin bestätigen 💌
        </button>

      </div>

    </div>
  `;
}

/* 💌 Finale Ansicht */
function confirmDate() {

  const selectedDate =
    document.getElementById("dateInput").value;

  if (!selectedDate) {
    alert("Bitte wähle erst ein Datum aus 😊");
    return;
  }

  const formattedDate =
    new Date(selectedDate)
    .toLocaleString("de-DE");

  app.innerHTML = `
    <div class="screen">

      <div class="bigText">
        Perfekt 😍
      </div>

      <div class="subText">

        Unser Date steht fest 💖
        <br><br>

        <strong>Aktivität:</strong>
        <br>
        ${selectedActivity}
        <br><br>

        <strong>Datum:</strong>
        <br>
        ${formattedDate}

      </div>

    </div>
  `;
}
</script>

</body>
</html>

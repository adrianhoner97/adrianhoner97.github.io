<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Anfrage 🙊</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      color: white;
      margin-bottom: 40px;
    }

    button {
      padding: 15px 30px;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: absolute;
      transition: 0.15s;
    }

    #yesBtn {
      background-color: #4CAF50;
      color: white;
      left: 45%;
      top: 60%;
    }

    #noBtn {
      background-color: #ff4d4d;
      color: white;
      left: 55%;
      top: 60%;
    }

    /* Debug Panel */
    #debugPanel {
      position: fixed;
      right: 10px;
      bottom: 10px;
      width: 260px;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0,0,0,0.7);
      color: #00ffae;
      font-size: 12px;
      padding: 10px;
      border-radius: 10px;
      z-index: 9999;
    }
  </style>
</head>

<body>

<!-- Debug Panel -->
<div id="debugPanel">
  <strong>🔎 Debug Log</strong>
  <div id="log"></div>
</div>

<!-- YouTube Musik -->
<iframe 
  width="0" 
  height="0"
  src="https://www.youtube.com/embed/CJRHfxM5B8A?autoplay=1&loop=1&playlist=CJRHfxM5B8A"
  frameborder="0"
  allow="autoplay">
</iframe>

<div class="container">
  <h1>Liebe Daniela, willst du mit mir auf ein Date gehen? 😊</h1>

  <button id="yesBtn">Ja ❤️</button>
  <button id="noBtn">Nein 💔</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const logBox = document.getElementById("log");

function log(msg) {
  logBox.innerHTML += "<div>" + msg + "</div>";
  logBox.scrollTop = logBox.scrollHeight;
}

/* NO Button weglaufen */
noBtn.addEventListener("mouseover", () => {
  const maxX = window.innerWidth - noBtn.offsetWidth;
  const maxY = window.innerHeight - noBtn.offsetHeight;

  noBtn.style.left = Math.random() * maxX + "px";
  noBtn.style.top = Math.random() * maxY + "px";

  log("❌ Nein-Button ausgewichen");
});

/* YES */
yesBtn.addEventListener("click", () => {
  log("❤️ Ja geklickt");

  document.body.innerHTML = `
    <div style="
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background:linear-gradient(135deg,#ff9a9e,#fad0c4);
      font-family:Arial,sans-serif;
      color:white;
      text-align:center;
      padding:20px;
      box-sizing:border-box;
    ">
      <div style="font-size:3rem; font-weight:bold;">
        Juhuu 😍
      </div>

      <p style="font-size:1.3rem;">
        Das wird bestimmt ein wunderschönes Date 😍
      </p>

      <button onclick="showCalendar()" style="
        padding:16px 32px;
        font-size:1.1rem;
        border:none;
        border-radius:14px;
        background:white;
        color:#ff5e8a;
        font-weight:bold;
      ">
        Fast geschafft ✨
      </button>
    </div>
  `;
});

/* Kalender */
function showCalendar() {
  log("📅 Kalender geöffnet");

  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ffdde1,#ee9ca7);
      font-family:Arial,sans-serif;
    ">

      <div style="
        background:rgba(255,255,255,0.18);
        padding:35px;
        border-radius:24px;
        text-align:center;
        max-width:420px;
        color:white;
      ">

        <h1>Wann passt es dir? 😊</h1>

        <input type="datetime-local" id="dateInput" style="
          width:100%;
          padding:16px;
          border:none;
          border-radius:14px;
          margin-bottom:20px;
        ">

        <button onclick="confirmDate()" style="
          width:100%;
          padding:16px;
          border:none;
          border-radius:14px;
          background:white;
          color:#ff5e8a;
          font-weight:bold;
        ">
          Termin bestätigen 💌
        </button>

      </div>
    </div>
  `;
}

/* Confirm */
function confirmDate() {
  const selectedDate = document.getElementById("dateInput").value;

  log("📥 Rohwert Datum: " + selectedDate);

  if (!selectedDate) {
    log("⚠️ Kein Datum gewählt");
    alert("Bitte wähle erst ein Datum aus 😊");
    return;
  }

  const formattedDate = new Date(selectedDate).toLocaleString("de-DE");

  log("✅ Formatiertes Datum: " + formattedDate);

  document.body.innerHTML = `
    <div style="
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background:linear-gradient(135deg,#ff9a9e,#fad0c4);
      font-family:Arial,sans-serif;
      color:white;
      text-align:center;
    ">

      <div style="font-size:2.5rem; font-weight:bold;">
        Perfekt 😍
      </div>

      <p style="font-size:1.3rem;">
        Unser Date ist geplant für:<br><br>
        <strong>${formattedDate}</strong> 💖
      </p>

    </div>
  `;
}
</script>

</body>
</html>
